# Netlify UI: Base directory = / (repo root), Package directory = apps/website-mock-client

[build]
  command = "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install --frozen-lockfile && pnpm --filter @techrecruit/website-mock-client exec next build"
  publish = "apps/website-mock-client/.next"

[build.environment]
  NODE_VERSION = "22"
  PNPM_FLAGS = "--shamefully-hoist"
  SECRETS_SCAN_OMIT_KEYS = "TENANT_ID,BACKEND_URL,BACKEND_TENANT_APPLICATIONS_URL,GOOGLE_APPLICATION_CREDENTIALS,NEXT_PUBLIC_FIREBASE_PROJECT_ID,FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,REVALIDATE_SECRET,NEXT_PUBLIC_TENANT_ID,NEXT_PUBLIC_PORTAL_URL,NEXT_PUBLIC_MARKETING_SITE_URL,NEXT_PUBLIC_SITE_LABEL"
  SECRETS_SCAN_OMIT_PATHS = "**/node_modules/**,**/.netlify/**,README.md,env.example,packages/shared/src/data/jobs.json,packages/shared/src/data/seed-jobs.ts,packages/shared/src/data/vacancy-json-examples.json,packages/shared/src/data/vacancy-normalized-from-document.example.json"
